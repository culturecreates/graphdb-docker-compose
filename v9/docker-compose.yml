version: '2'
services:
  graphdb:
    container_name: graph-db-instance
    image: culturecreatesorg/graphdb
    restart: always
    volumes:
      - /Users/saumier/data:/opt/graphdb/home
    ports:
      - '7200:7200'
    command: > 
      -Dgraphdb.workbench.cors.enable=true 
      -Dgraphdb.home=/opt/graphdb/home 
      -Xms4g 
      -XX:MaxDirectMemorySize=6g
