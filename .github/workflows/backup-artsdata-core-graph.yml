name: Backup Artsdata Core Graph to S3

on:
  workflow_dispatch:
    inputs:
      graphdb_host:
        description: "GraphDB host (e.g. staging.db.artsdata.ca or db.artsdata.ca)"
        required: true
        default: "staging.db.artsdata.ca"
  schedule:
    - cron: "0 6 * * *"   # Daily at 6:00 AM UTC

env:
  S3_BUCKET_NAME: artsdata-graphdb-backups
  S3_REGION: ca-central-1
  GRAPHDB_HOST: ${{ github.event.inputs.graphdb_host || 'db.artsdata.ca' }}

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Set date variables
        id: vars
        run: |
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "MONTH=$(date +%Y-%m)" >> $GITHUB_OUTPUT
          echo "DAY=$(date +%d)" >> $GITHUB_OUTPUT

      - name: Download core graph dump
        run: |
          curl -f -X GET \
            "https://${{ env.GRAPHDB_HOST }}/repositories/artsdata/statements?context=%3Chttp%3A%2F%2Fkg.artsdata.ca%2Fcore%3E" \
            -H "accept: text/x-turtlestar" \
            -o "${{ steps.vars.outputs.DATE }}-artsdata-core.ttls"

      - name: Compress dump
        run: |
          gzip "${{ steps.vars.outputs.DATE }}-artsdata-core.ttls"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.S3_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.S3_REGION }}

      - name: Upload daily backup
        run: |
          aws s3 cp \
            "${{ steps.vars.outputs.DATE }}-artsdata-core.ttls.gz" \
            "s3://${{ env.S3_BUCKET_NAME }}/daily/${{ steps.vars.outputs.DATE }}-artsdata-core.ttls.gz"

      - name: Upload monthly snapshot (1st of month only)
        if: steps.vars.outputs.DAY == '01'
        run: |
          aws s3 cp \
            "${{ steps.vars.outputs.DATE }}-artsdata-core.ttls.gz" \
            "s3://${{ env.S3_BUCKET_NAME }}/monthly/${{ steps.vars.outputs.DATE }}-artsdata-core.ttls.gz"